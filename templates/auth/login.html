{% extends "base.html" %}
{% block content %}
<section class="flex min-h-[70vh] items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="text-center">
      <a href="{{ url_for('home') }}" class="font-display text-3xl font-semibold">Aluyè Naturals</a>
      <h1 class="mt-6 font-display text-4xl font-semibold">Sign in to your account</h1>
    </div>
    <form method="post" class="mt-8 space-y-5">
      <div>
        <label for="email" class="text-sm font-semibold">Email address</label>
        <input id="email" name="email" type="email" required autocomplete="email" class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
      </div>
      <div>
        <label for="password" class="text-sm font-semibold">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
      </div>
      <button class="btn-primary w-full">Sign In</button>
    </form>
    <div class="mt-6 flex items-center gap-4"><div class="h-px flex-1 bg-sand"></div><span class="text-sm text-bark">or</span><div class="h-px flex-1 bg-sand"></div></div>
    <a href="{{ url_for('register') }}" class="btn-secondary mt-6 block w-full text-center">Create an account</a>
  </div>
</section>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<section class="flex min-h-[70vh] items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="text-center">
      <a href="{{ url_for('home') }}" class="font-display text-3xl font-semibold">Aluyè Naturals</a>
      <h1 class="mt-6 font-display text-4xl font-semibold">Create your account</h1>
    </div>
    <form method="post" class="mt-8 space-y-5">
      <div class="grid gap-5 sm:grid-cols-2">
        <div>
          <label for="first_name" class="text-sm font-semibold">First name</label>
          <input id="first_name" name="first_name" required class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
        </div>
        <div>
          <label for="last_name" class="text-sm font-semibold">Last name</label>
          <input id="last_name" name="last_name" required class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
        </div>
      </div>
      <div>
        <label for="email" class="text-sm font-semibold">Email address</label>
        <input id="email" name="email" type="email" required class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
      </div>
      <div>
        <label for="password" class="text-sm font-semibold">Password (min 8 characters)</label>
        <input id="password" name="password" type="password" required minlength="8" class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
      </div>
      <div>
        <label for="confirm_password" class="text-sm font-semibold">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" required class="mt-2 min-h-12 w-full border border-sand bg-cream px-4">
      </div>
      <label class="flex items-start gap-3 text-sm">
        <input type="checkbox" required class="mt-1 size-4 accent-ink">
        <span>I agree to the <a href="{{ url_for('privacy_policy') }}" class="underline">Privacy Policy</a> and <a href="{{ url_for('terms') }}" class="underline">Terms of Service</a></span>
      </label>
      <button class="btn-primary w-full">Create Account</button>
    </form>
    <p class="mt-6 text-center text-sm text-bark">Already have an account? <a href="{{ url_for('login') }}" class="font-semibold underline">Sign in</a></p>
  </div>
</section>
{% endblock %}

{% extends "base.html" %}
{% from "macros.html" import icon %}

{% block content %}
<section class="page-shell py-12 md:py-16">
  <p class="eyebrow text-bark">Your saved products</p>
  <h1 class="mt-3 font-display text-5xl font-semibold leading-none md:text-6xl">Wishlist</h1>

  <div id="wishlist-grid" class="mt-10 grid grid-cols-2 gap-4 lg:grid-cols-4 lg:gap-6"></div>

  <div id="wishlist-empty" class="py-24 text-center">
    {{ icon("heart", "mx-auto size-12") }}
    <h2 class="mt-5 font-display text-4xl font-semibold">Your wishlist is empty</h2>
    <p class="mt-3 text-bark">Save products you love by tapping the heart icon.</p>
    <a href="{{ url_for('shop') }}" class="btn-primary mt-7">Start Shopping</a>
  </div>
</section>

<script>
(function() {
  const KEY = "aluye-wishlist";
  const slugs = JSON.parse(localStorage.getItem(KEY) || "[]");
  const grid = document.querySelector("#wishlist-grid");
  const empty = document.querySelector("#wishlist-empty");
  if (!slugs.length) { grid.hidden = true; return; }
  empty.hidden = true;

  const allProducts = {{ products|tojson }};
  const wishProducts = slugs.map(s => allProducts.find(p => p.slug === s)).filter(Boolean);
  if (!wishProducts.length) { grid.hidden = true; empty.hidden = false; return; }

  grid.innerHTML = wishProducts.map(p => `
    <article class="bg-white">
      <a href="/products/${p.slug}" class="block aspect-[4/5] border border-sand overflow-hidden bg-white">
        <img src="/media/products/${p.image}" alt="${p.name}" class="h-full w-full object-contain p-5">
      </a>
      <div class="p-4">
        <h3 class="text-sm font-semibold"><a href="/products/${p.slug}" class="hover:underline">${p.name}</a></h3>
        <p class="mt-1 text-sm font-semibold" data-money data-price="${p.price}">$${p.price}</p>
        <div class="mt-3 grid grid-cols-2 gap-2">
          <form action="/cart/add/${p.slug}" method="post">
            <button class="min-h-11 w-full bg-black px-3 text-xs font-bold uppercase tracking-wide text-white">Add to Cart</button>
          </form>
          <button onclick="removeWish('${p.slug}', this)" class="min-h-11 border border-black px-3 text-xs font-bold uppercase tracking-wide">Remove</button>
        </div>
      </div>
    </article>
  `).join("");
  updateCurrency();
})();
function removeWish(slug, btn) {
  const KEY = "aluye-wishlist";
  let slugs = JSON.parse(localStorage.getItem(KEY) || "[]");
  slugs = slugs.filter(s => s !== slug);
  localStorage.setItem(KEY, JSON.stringify(slugs));
  btn.closest("article").remove();
  if (!slugs.length) {
    document.querySelector("#wishlist-grid").hidden = true;
    document.querySelector("#wishlist-empty").hidden = false;
  }
}
</script>
{% endblock %}

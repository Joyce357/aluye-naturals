<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login | Aluyè Naturals</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"></head>
<body class="grid min-h-dvh place-items-center bg-[#1a1a1a] p-5 text-white">
  <main class="w-full max-w-md border border-white/20 bg-[#242424] p-7 sm:p-10">
    <p class="text-xs uppercase tracking-[0.2em] text-shea">Secure administration</p>
    <h1 class="mt-4 font-display text-5xl font-semibold">Welcome back.</h1>
    <p class="mt-3 text-sm leading-6 text-white/60">Manage products, orders, content and store settings.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<p role="alert" class="mt-5 border border-error bg-white p-3 text-sm text-error">{{ message }}</p>{% endfor %}{% endwith %}
    <form method="post" class="mt-8 space-y-5">
      <div><label for="username" class="text-sm font-semibold">Username</label><input id="username" name="username" required autocomplete="username" class="mt-2 min-h-12 w-full border border-white/25 bg-black px-4 text-white"></div>
      <div><label for="password" class="text-sm font-semibold">Password</label><input id="password" name="password" type="password" required autocomplete="current-password" class="mt-2 min-h-12 w-full border border-white/25 bg-black px-4 text-white"></div>
      <button class="min-h-12 w-full bg-shea px-5 font-bold text-ink">Sign in</button>
    </form>
    <p class="mt-6 text-xs text-white/45">Initial credentials: admin / aluye2026</p>
  </main>
</body></html>
